<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PATAKA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <link href="https://fonts.cdnfonts.com/css/samarkan" rel="stylesheet" />

  <style>

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 1 — DESIGN TOKENS
       branch: feature/hero-cinematic
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    :root {

      --bg-0: #030108;
      --bg-1: #07030f;
      --bg-2: #0c0416;
      --bg-3: #130518;

      --wine:      #6b0f1a;
      --maroon:    #8b1a2a;
      --cherry:    #a02038;
      --cherry-lt: #c03050;
      --plum-red:  #7a1030;

      --moss:   #1a3a20;
      --forest: #244d2a;
      --sage:   #3a6640;

      --ivory: #ede0d8;
      --cream: #c8b5aa;
      --muted: #7a6068;

      --ease-film: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--bg-0);
      color: var(--ivory);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RITANSHU — KISS CURSOR SYSTEM
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    #pataka-cursor {
      position: fixed;
      font-size: 26px;
      line-height: 1;
      pointer-events: none;
      z-index: 9999;

      transform: translate(-4px, -4px);

      opacity: 0;

      transition:
        opacity 0.3s,
        font-size 0.2s cubic-bezier(0.34,1.56,0.64,1),
        transform 0.15s cubic-bezier(0.34,1.56,0.64,1);

      will-change: left, top;

      user-select: none;

      filter: drop-shadow(0 1px 4px rgba(90,8,20,0.45));
    }

    body.cur-hover #pataka-cursor {
      font-size: 32px;
      transform: translate(-4px, -8px);
    }

    body.cur-click #pataka-cursor {
      font-size: 20px;
      transform: translate(-4px, 2px) rotate(-15deg);

      transition:
        font-size 0.07s ease,
        transform 0.07s ease;
    }

    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 9998;

      width: 0;
      height: 0;
    }

    .spark-dot {
      position: absolute;

      transform: translate(-50%, -50%);

      animation: sparkfly 0.55s ease-out forwards;
    }

    @keyframes sparkfly {

      0% {
        opacity: 1;
        transform: translate(-50%,-50%) scale(1.2);
      }

      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0);
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 1 — HERO SCENE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    #hero {

      position: relative;

      width: 100%;
      height: 100svh;

      min-height: 580px;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;

      background:
        radial-gradient(
          ellipse 85% 55% at 50% 105%,
          rgba(90, 10, 22, 0.65) 0%,
          transparent 60%
        ),

        radial-gradient(
          ellipse 60% 45% at 8% 50%,
          rgba(60, 8, 18, 0.45) 0%,
          transparent 55%
        ),

        radial-gradient(
          ellipse 55% 40% at 92% 25%,
          rgba(40, 8, 14, 0.38) 0%,
          transparent 55%
        ),

        radial-gradient(
          ellipse 35% 30% at 88% 12%,
          rgba(20, 45, 22, 0.16) 0%,
          transparent 60%
        ),

        linear-gradient(
          175deg,
          #04010a 0%,
          #080214 40%,
          #0e0418 70%,
          #060110 100%
        );
    }

    #hero::after {

      content: '';

      position: absolute;

      bottom: -60px;
      left: 50%;

      transform: translateX(-50%);

      width: 75%;
      height: 280px;

      background:
        radial-gradient(
          ellipse,
          rgba(100, 12, 28, 0.12) 0%,
          transparent 68%
        );

      filter: blur(35px);

      pointer-events: none;

      z-index: 1;
    }

    #dust {

      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      z-index: 2;

      pointer-events: none;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 1 — CORE LAYOUT
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .core {

      position: relative;
      z-index: 10;

      text-align: center;

      padding: 0 2rem;

      display: flex;
      flex-direction: column;

      align-items: center;

      will-change: opacity, transform;
    }

    .eyebrow {

      font-family: 'DM Sans', sans-serif;

      font-size: 8px;
      font-weight: 300;

      letter-spacing: 0.48em;

      text-transform: uppercase;

      color: rgba(180, 100, 115, 0.55);

      margin-bottom: 1.8rem;

      opacity: 0;

      transform: translateY(5px);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 1 — SAMARKAN LOGO
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .logo-wrap {

      position: relative;

      display: inline-flex;

      align-items: center;
      justify-content: center;

      margin-bottom: 1.6rem;
    }

    .logo-halo {

      position: absolute;

      inset: -30px -10%;

      background:
        radial-gradient(
          ellipse,
          rgba(120, 14, 32, 0.14) 0%,
          rgba(80, 8, 20, 0.06) 50%,
          transparent 72%
        );

      filter: blur(18px);

      pointer-events: none;

      z-index: -1;

      opacity: 0;
    }

    .logo {

      font-family: 'Samarkan', 'Palatino Linotype', serif;

      font-size: clamp(60px, 12vw, 130px);

      font-weight: 400;

      letter-spacing: 0.22em;

      line-height: 1;

      display: inline-block;

      background:
        linear-gradient(
          150deg,
          #4a0810 0%,
          #7a1428 16%,
          #9e1f38 30%,
          #be3050 44%,
          #d04060 50%,
          #be3050 56%,
          #9e1f38 70%,
          #7a1428 84%,
          #4a0810 100%
        );

      -webkit-background-clip: text;
      background-clip: text;

      -webkit-text-fill-color: transparent;

      opacity: 0;

      filter: blur(26px);

      transform: scale(0.92);

      will-change: filter, opacity, transform;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 1 — TAGLINE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .tagline {

      font-family: 'Playfair Display', Georgia, serif;

      font-size: clamp(12.5px, 1.7vw, 17px);

      font-weight: 400;
      font-style: italic;

      color: var(--cream);

      letter-spacing: 0.05em;

      opacity: 0;

      margin-bottom: 3rem;

      min-height: 1.5em;

      display: flex;

      align-items: center;
      justify-content: center;
    }

    .tw-cur {

      display: inline-block;

      width: 1px;
      height: 1em;

      background: rgba(160, 32, 56, 0.7);

      margin-left: 2px;

      vertical-align: middle;

      animation: blink 1.1s ease-in-out infinite;
    }

    @keyframes blink {

      0%,44% {
        opacity: 1;
      }

      50%,100% {
        opacity: 0;
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 1 — SINGLE CTA
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    .cta-wrap {

      display: flex;
      flex-direction: column;

      align-items: center;

      gap: 0.85rem;

      opacity: 0;

      transform: translateY(14px);
    }

    .btn-primary {

      font-family: 'DM Sans', sans-serif;

      font-size: 9px;

      font-weight: 400;

      letter-spacing: 0.3em;

      text-transform: uppercase;

      padding: 13px 44px;

      background:
        linear-gradient(
          135deg,
          #6b0f1a 0%,
          #8b1a2a 45%,
          #9e2035 55%,
          #7a1428 100%
        );

      color: rgba(237, 224, 216, 0.92);

      border: none;
      outline: none;

      cursor: none;

      position: relative;

      overflow: hidden;

      transition:
        transform .4s var(--ease-film),
        box-shadow .4s var(--ease-film);
    }

    .btn-primary::after {

      content: '';

      position: absolute;

      top: 0;
      left: -100%;

      width: 100%;
      height: 100%;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(255,255,255,0.08),
          transparent
        );

      transition: left .65s ease;
    }

    .btn-primary:hover::after {
      left: 100%;
    }

    .btn-primary:hover {

      transform: translateY(-2px);

      box-shadow:
        0 8px 28px rgba(107, 15, 26, 0.35),
        0 2px 8px rgba(0,0,0,0.5);
    }

    .btn-sub {

      font-family: 'Playfair Display', Georgia, serif;

      font-size: 11px;

      font-style: italic;

      color: rgba(180, 100, 115, 0.42);

      letter-spacing: 0.06em;
    }

    .green-rule {

      width: 28px;
      height: 0.5px;

      background:
        linear-gradient(
          90deg,
          transparent,
          #3a6640,
          transparent
        );

      margin-bottom: 1.8rem;

      opacity: 0;

      transform: scaleX(0);

      transform-origin: center;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 2 — PERF / ACCESSIBILITY
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    @media (prefers-reduced-motion: reduce) {

      .grain {
        animation: none;
      }

      .tw-cur {
        animation: none;
        opacity: 1;
      }
    }

    @media (hover: none), (pointer: coarse) {

      body {
        cursor: auto;
      }

      #pataka-cursor,
      #spark-wrap {
        display: none !important;
      }

      .btn-primary {
        cursor: pointer;
      }
    }

    @media (max-width: 480px) {

      .btn-primary {
        padding: 13px 32px;
      }
    }

  </style>
</head>

<body>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RITANSHU — KISS CURSOR SYSTEM
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

  <div id="pataka-cursor">💗</div>

  <div id="spark-wrap" class="spark"></div>

  <section id="hero" role="banner">

    <canvas id="dust" aria-hidden="true"></canvas>

    <div class="core" id="core">

      <span class="eyebrow" id="eyebrow">
        emotional universe
      </span>

      <div class="logo-wrap">

        <div class="logo-halo" id="halo"></div>

        <h1 class="logo" id="logo" aria-label="PATAKA">
          PATAKA
        </h1>

      </div>

      <p class="tagline" id="tagline" aria-live="polite">

        <span id="tw"></span>

        <span class="tw-cur" aria-hidden="true"></span>

      </p>

      <div class="green-rule" id="rule"></div>

      <div class="cta-wrap" id="cta">

        <button class="btn-primary" id="btnDecode">
          Decode Yourself
        </button>

        <span class="btn-sub">
          khud ko parkhein.
        </span>

      </div>

    </div>

  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTRIBUTOR 2 — CONFIG + DEVICE DETECTION
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    const CFG = {

      tagline: "every pataka burns differently.",

      tw: {
        min: 46,
        max: 90,
        space: 54,
        punct: 210
      },

      isTouch: 'ontouchstart' in window,

      particles:
        (navigator.hardwareConcurrency || 4) <= 4
          ? 38
          : 62,
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RITANSHU — KISS CURSOR SYSTEM
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    (function () {

      if (
        CFG.isTouch ||
        window.matchMedia('(pointer: coarse)').matches
      ) return;

      const cur       = document.getElementById('pataka-cursor');
      const sparkWrap = document.getElementById('spark-wrap');

      let mx = innerWidth / 2;
      let my = innerHeight / 2;

      document.addEventListener(
        'mousemove',
        function first(e) {

          mx = e.clientX;
          my = e.clientY;

          cur.style.opacity = '1';

          document.removeEventListener('mousemove', first);

        },
        { once: true }
      );

      document.addEventListener('mousemove', e => {

        mx = e.clientX;
        my = e.clientY;

      });

      (function tick() {

        cur.style.left = mx + 'px';
        cur.style.top  = my + 'px';

        requestAnimationFrame(tick);

      })();

      document.querySelectorAll('button, a').forEach(el => {

        el.addEventListener('mouseenter', () => {
          document.body.classList.add('cur-hover');
        });

        el.addEventListener('mouseleave', () => {
          document.body.classList.remove('cur-hover');
        });

      });

      function burst(x, y, big = false) {

        const count = big ? 10 : 6;

        for (let i = 0; i < count; i++) {

          const dot = document.createElement('div');

          dot.className = 'spark-dot';

          const angle =
            (i / count) * Math.PI * 2 +
            Math.random() * 0.5;

          const dist =
            big
              ? 35 + Math.random() * 45
              : 16 + Math.random() * 24;

          dot.textContent =
            i % 3 === 0
              ? '♡'
              : '·';

          dot.style.cssText = `
            left:${x}px;
            top:${y}px;

            font-size:${big ? 13 : 9}px;

            color:${i % 2 === 0 ? '#a02038' : '#c8b5aa'};

            --dx:${Math.cos(angle) * dist}px;
            --dy:${Math.sin(angle) * dist}px;

            animation-duration:${big ? 0.75 : 0.52}s;

            line-height:1;

            display:flex;
            align-items:center;
            justify-content:center;

            width:16px;
            height:16px;
          `;

          sparkWrap.appendChild(dot);

          setTimeout(() => {
            dot.remove();
          }, big ? 780 : 560);
        }
      }

      document.addEventListener('mousedown', e => {

        document.body.classList.add('cur-click');

        burst(e.clientX, e.clientY, false);

      });

      document.addEventListener('mouseup', () => {

        setTimeout(() => {
          document.body.classList.remove('cur-click');
        }, 100);

      });

      document.addEventListener('dblclick', e => {

        burst(e.clientX, e.clientY, true);

      });

    })();

  </script>

</body>
</html>
